url: https://monitoramento.sepe.pe.gov.br/bigdatape/
template:
  light-switch: false
  dark-mode: false
  trailing_slash_redirect: true
  package: tidytemplate
  bootstrap: 5
  bslib:

includes:
  in_header: |
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DLS5W18G7P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DLS5W18G7P');
    </script>

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/StrategicProjects/bigdatape
      aria-label: Github
    articles:
      text: Articles
      menu:
        - text: "Exploring Dengue Data with BigDataPE"
          href: articles/dengue-bigdatape.html
# navbar:
#   structure:
#     left:  [intro, reference]
#     right: [search, github, lightswitch]

footer:
  structure:
    left: [rmd]
    right: [developed_by]
  components:
      #p: "\n\n"
      rmd: |
        **BigDataPE** is part of an ecosystem of R packages for data analysis and
        computational document processing<br>developed at the [Secretaria Executiva
        de Monitoramento Estratégico](https://monitoramento.sepe.pe.gov.br).
      developed_by: |
        Developed by André Leite, Diogo Bezerra, Hugo Medeiros, Marcos Wasilew and Carlos Amorin

development:
  mode: auto
